<!DOCTYPE html>
<html>
<head>
<title>Calendar 2026</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400  ;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
font-family: 'Quicksand', sans-serif;
    
text-align: center;
    
    min-height: 100vh;
    
background: linear-gradient(135deg, #1a0b1a 0%, #2d1b2d 25%, #1f0f2e 50%, #2a1525 75%, #1a0b15 100%);
    
background-size: 400% 400%;
    
    animation: gradientShift 15s ease infinite;
    
position: relative;
    
    overflow-x: hidden;
    
color: #ffb6c1;
}

/* animation for Sparkle */
body::before {
    content: '✨';
position: fixed;
    top: 10%;    left: 5%;
    font-size: 30px;
animation: float 6s ease-in-out infinite;
    opacity: 0.8;
filter: drop-shadow(0 0 10px #ff1493);
    pointer-events: none;
}

body::after {
    content: '🖤';
position: fixed;
    top: 20%;
right: 10%;
font-size: 25px;
animation: float 8s ease-in-out infinite reverse;
    opacity: 0.7;
    filter: drop-shadow(0 0 8px #ff69b4);
pointer-events: none;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    
50% { background-position: 100% 50%; }
    
    100% { background-position: 0% 50%; }
}

@keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
50% { transform: translateY(-20px) rotate(10deg); }
}

.header-title {
    color: #ff1493;
    text-shadow: 
     0 0 10px #ff1493,
0 0 20px #ff1493,
            0 0 30px #ff69b4;
    padding: 20px 40px;

    margin-top: 40px;
  
    font-size: 24px;  font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    
    letter-spacing: 3px; text-transform: uppercase;
    position: relative;
    display: inline-block;
}

h1 {
    color: #ff1493;
    text-shadow: 
        0 0 10px #ff1493,
        0 0 20px #ff1493,
        0 0 30px #ff69b4,
        3px 3px 0px #4a0e2e;
    display: inline-block;
    padding: 10px 40px 20px;
    margin-top: 0;font-size: 52px;
    font-family: 'Pacifico', cursive;
    
    font-weight: normal;
    letter-spacing: 2px;position: relative;
    filter: drop-shadow(0 4px 6px rgba(255, 20, 147, 0.4));
}

h1::before {
    content: '🥀';
    position: absolute;
    left: -30px;
    
    top: 50%;
    transform: translateY(-50%);font-size: 40px;
    animation: bounce 2s infinite;filter: drop-shadow(0 0 5px #ff1493);
}

h1::after {
    content: '🥀';
    position: absolute;
    right: -30px;top: 50%;
    
transform: translateY(-50%);
    font-size: 40px; animation: bounce 2s infinite 0.5s;
    filter: drop-shadow(0 0 5px #ff1493);
}

@keyframes bounce {
    0%, 100% { transform: translateY(-50%) scale(1); }
    50% { transform: translateY(-60%) scale(1.1); }
}

p {
    font-weight: 600;
    font-style: italic; color: #db7093;
    
    font-size: 20px;
    margin: 20px 0 30px;text-shadow: 0 0 10px rgba(219, 112, 147, 0.5);
    position: relative;display: inline-block;
}

p::before, p::after {
    content: '♡';
    color: #ff1493;
    margin: 0 10px;
    font-size: 18px;
    text-shadow: 0 0 10px #ff1493;
}

.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
    width: 70%;
    max-width: 800px;
    margin: 0 auto 50px;
    padding: 20px;
}

a {
    text-decoration: none;
    padding: 20px;
    background: linear-gradient(145deg, #2d1525, #3d1f30);
    
    color: #ffb6c1;
    font-weight: 700;font-size: 18px;border-radius: 20px;
    display: block; position: relative; overflow: hidden; border: 2px solid #ff1493;
    box-shadow: 
        0 6px 0 #4a0e2e,
        0 8px 20px rgba(255, 20, 147, 0.4),
        inset 0 2px 0 rgba(255, 255, 255, 0.1),
        0 0 15px rgba(255, 20, 147, 0.2);
    transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);text-shadow: 0 0 5px rgba(255, 20, 147, 0.5);
    letter-spacing: 1px;font-family: 'Quicksand', sans-serif;
}

a::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255, 20, 147, 0.3) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
}

a:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 
        0 9px 0 #4a0e2e,
        0 12px 25px rgba(255, 20, 147, 0.6),
        inset 0 2px 0 rgba(255, 255, 255, 0.2),
        0 0 25px rgba(255, 20, 147, 0.4);
    background: linear-gradient(145deg, #3d1f30, #4a2538);
    color: #fff;
    border-color: #ff69b4;
}

a:hover::before {
    opacity: 1;
}

a:active {
    transform: translateY(3px);
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}


/* flying animation */
.floating-hearts {
    position: fixed;
    width: 100%; height: 100%; pointer-events: none;
   
    overflow: hidden; top: 0;
    left: 0;
    z-index: -1;
}

.heart {
    position: absolute;
    color: rgba(255, 20, 147, 0.3);
    font-size: 20px;
    animation: floatUp 10s linear infinite;
    filter: drop-shadow(0 0 5px #ff1493);
}

.heart:nth-child(1) { left: 10%; animation-delay: 0s; }
.heart:nth-child(2) { left: 30%; animation-delay: 2s; font-size: 30px; }.heart:nth-child(3) { left: 50%; animation-delay: 4s; }
.heart:nth-child(4) { left: 70%; animation-delay: 6s; font-size: 25px; }
.heart:nth-child(5) { left: 90%; animation-delay: 8s; }

@keyframes floatUp {
    0% {
transform: translateY(100vh) rotate(0deg);
    opacity: 0;
    }
10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% {
 transform: translateY(-100vh) rotate(720deg);
opacity: 0;
    }
}

/* glow ipiks */
.glow-text {
    animation: textGlow 2s ease-in-out infinite alternate;
}

@keyframes textGlow {
    from { text-shadow: 0 0 10px #ff1493, 0 0 20px #ff1493; }
    to { text-shadow: 0 0 20px #ff69b4, 0 0 30px #ff69b4, 0 0 40px #ff69b4; }
}

.footer {
    margin-top: 30px;
    padding: 20px; color: #ff69b4;
    font-size: 14px; font-weight: 600;
    letter-spacing: 1px;text-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
    border-top: 1px solid rgba(255, 20, 147, 0.3); display: inline-block;
 margin-bottom: 40px;
}

@media (max-width: 768px) {
    .container {
        grid-template-columns: repeat(2, 1fr);
        width: 90%;
    }
    h1 { font-size: 36px; }
    h1::before, h1::after { font-size: 30px; }
    .header-title { font-size: 18px; }
}
</style>

</head>

<body>

<div class="floating-hearts">
    <div class="heart">🖤</div> <div class="heart">💜</div>
    <div class="heart">💗</div><div class="heart">🥀</div>
    <div class="heart">✨</div>
</div>
