<!DOCTYPE html>
<html>
<head>
<title>November 2026</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400 ;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    text-align: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0b1a 0%, #2d1b2d 25%, #1f0f2e 50%, #2a1525 75%, #1a0b15 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    position: relative;
    overflow-x: hidden;
    color: #ffb6c1;
    font-family: 'Quicksand', sans-serif;
    padding: 20px;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

table {
    border-collapse: collapse;
    margin: 30px auto;
    box-shadow: 0 0 30px rgba(255, 20, 147, 0.3);
    border-radius: 15px;
    overflow: hidden;
}

h1 {
    color: #ff1493;
    text-shadow: 
        0 0 10px #ff1493,
        0 0 20px #ff1493,
        0 0 30px #ff69b4,
        3px 3px 0px #4a0e2e;
    display: inline-block;
    padding: 20px 40px;
    margin-top: 20px;
    font-size: 48px;
    font-family: 'Pacifico', cursive;
    font-weight: normal;
    letter-spacing: 2px;
    position: relative;
    filter: drop-shadow(0 4px 6px rgba(255, 20, 147, 0.4));
}

h1::after {
    content: '🍁';
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 35px;
    animation: bloom 3s ease-in-out infinite 0.5s;
    filter: drop-shadow(0 0 5px #ff1493);
}

@keyframes bloom {
    0%, 100% { transform: translateY(-50%) scale(1) rotate(-5deg); }
    50% { transform: translateY(-50%) scale(1.1) rotate(5deg); }
}

th, td {
    border: 1px solid #ff1493;
    width: 80px;
    height: 60px;
    font-size: 18px;
    text-align: center;
    transition: all 0.3s ease;
}

th {
    background: linear-gradient(145deg, #2d1525, #3d1f30);
    color: #ff1493;
    font-weight: 700;
    text-shadow: 0 0 5px rgba(255, 20, 147, 0.5);
    font-family: 'Quicksand', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.1);
}

td {
    font-size: 20px;
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(145deg, #1f0f1f, #2a1520);
    color: #ffb6c1;
    font-weight: 600;
    cursor: pointer;
}

td:hover {
    background: linear-gradient(145deg, #3d1f30, #4a2538);
    color: #fff;
    box-shadow: inset 0 0 15px rgba(255, 20, 147, 0.3);
    transform: scale(1.05);
}

.highlight {
    background: linear-gradient(145deg, #0f050f, #1a0b15);
    color: #4a0e2e;
}

.highlight:hover {
    background: linear-gradient(145deg, #0f050f, #1a0b15);
    transform: none;
    box-shadow: none;
    cursor: default;
}
.nav-btn {
    border: 2px solid #ff1493;padding: 12px 24px;
    border-radius: 20px;background: linear-gradient(145deg, #2d1525, #3d1f30);
    color: #ffb6c1;  text-decoration: none;
    font-weight: 700;   font-family: 'Quicksand', sans-serif;   display: inline-block;
    margin: 10px;  box-shadow: 
        0 6px 0 #4a0e2e,
        0 8px 20px rgba(255, 20, 147, 0.4),
        0 0 15px rgba(255, 20, 147, 0.2);
    transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); text-shadow: 0 0 5px rgba(255, 20, 147, 0.5);
    letter-spacing: 1px; position: relative; overflow: hidden;
}

.nav-btn::before {
    content: '';   position: absolute;
   top: -50%;   left: -50%;
    width: 200%;  height: 200%;
    background: radial-gradient(circle, rgba(255, 20, 147, 0.3) 0%, transparent 60%);  opacity: 0;
    transition: opacity 0.3s;
}

.nav-btn:hover {
    transform: translateY(-3px) scale(1.05);   box-shadow: 
        0 9px 0 #4a0e2e,
        0 12px 25px rgba(255, 20, 147, 0.6),
        0 0 25px rgba(255, 20, 147, 0.4);
    background: linear-gradient(145deg, #3d1f30, #4a2538);  color: #fff;
    border-color: #ff69b4;
}

.nav-btn:hover::before {
    opacity: 1;
}

.nav-btn:active {
    transform: translateY(3px);
    box-shadow: 
        0 3px 0 #4a0e2e,
        0 4px 10px rgba(255, 20, 147, 0.4);
}

/* floats */
.floating-hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
    top: 0;
    left: 0;
    z-index: -1;
}

.heart {
    position: absolute;
    color: rgba(255, 20, 147, 0.2);
    font-size: 20px;
    animation: floatUp 12s linear infinite;
    filter: drop-shadow(0 0 5px #ff1493);
}

.heart:nth-child(1) { left: 15%; animation-delay: 0s; }.heart:nth-child(2) { left: 35%; animation-delay: 3s; font-size: 25px; }
.heart:nth-child(3) { left: 55%; animation-delay: 6s; }.heart:nth-child(4) { left: 75%; animation-delay: 9s; font-size: 30px; }

@keyframes floatUp {
    0% {
    transform: translateY(100vh) rotate(0deg); opacity: 0;
    }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-100vh) rotate(720deg); opacity: 0;
    }
}

@media (max-width: 768px) {
    th, td {
        width: 45px;
        height: 45px;
        font-size: 14px;
    }
    h1 { font-size: 36px; }
    h1::before, h1::after { font-size: 25px; }
    .nav-btn {
        padding: 10px 18px;
        font-size: 14px;
        margin: 5px;
    }
}
</style>

</head>
